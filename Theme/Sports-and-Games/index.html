<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Sports and Games</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:url("assets/background.png") center center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
}

.screen{
position:absolute;
inset:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
padding:10px;
}

.screen.active{
display:flex;
}

#logoScreen{
background:url("assets/background.png") center center/cover no-repeat;
}

#logoScreen img{
width:min(300px,70vw);
max-height:50vh;
object-fit:contain;
}

#titleScreen{
background:url("assets/background.png") center center/cover no-repeat;
text-align:center;
}

.title{
font-size:clamp(34px,5vw,58px);
font-weight:900;
line-height:1.1;
margin-bottom:25px;
text-shadow:2px 2px 4px rgba(0,0,0,.25);
animation:titleGlow 2s infinite alternate;
}

.title span:nth-child(1){color:#ff6b6b;}
.title span:nth-child(2){color:#4dabf7;}
.title span:nth-child(3){color:#51cf66;}
.title span:nth-child(4){color:#fcc419;}

@keyframes titleGlow{
from{transform:scale(1);}
to{transform:scale(1.05);}
}

#startBtn{
padding:16px 36px;
font-size:clamp(22px,3vw,30px);
font-weight:bold;
border:none;
border-radius:18px;
background:#ff922b;
color:white;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,.25);
}

#startBtn:active{
transform:scale(.95);
}

#gameScreen{
background:url("assets/background.png") center center/cover no-repeat;
}

.game-header{
font-size:clamp(28px,4vw,48px);
font-weight:900;
text-align:center;
margin-bottom:8px;
}

.game-header span:nth-child(1){color:#ff6b6b;}
.game-header span:nth-child(2){color:#4dabf7;}
.game-header span:nth-child(3){color:#51cf66;}
.game-header span:nth-child(4){color:#fcc419;}
}

.question{
font-size:clamp(18px,2vw,28px);
font-weight:700;
text-align:center;
background:rgba(255,255,255,.85);
padding:10px 16px;
border-radius:16px;
max-width:950px;
margin-bottom:10px;
}

.listen-btn{
padding:8px 18px;
border:none;
border-radius:14px;
background:#4dabf7;
color:white;
font-weight:bold;
margin-bottom:10px;
cursor:pointer;
}

.main-image{
width:min(45vh,420px);
height:min(38vh,340px);
object-fit:contain;
margin-bottom:10px;
}

.options{
display:flex;
gap:20px;
justify-content:center;
align-items:center;
width:100%;
}

.option{
width:min(28vw,220px);
height:min(28vw,220px);
min-width:120px;
min-height:120px;
background:white;
border-radius:24px;
padding:10px;
border:5px solid transparent;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
transition:.3s;
box-shadow:0 6px 12px rgba(0,0,0,.15);
}

.option img{
width:100%;
height:100%;
object-fit:contain;
}

.option.correct{
border-color:#37b24d;
}

.option.glow{
animation:glow 1s infinite;
}

@keyframes glow{
0%{
box-shadow:0 0 5px #37b24d;
}
50%{
box-shadow:0 0 25px #37b24d;
}
100%{
box-shadow:0 0 5px #37b24d;
}
}

.wrong{
animation:shake .35s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-8px);}
50%{transform:translateX(8px);}
75%{transform:translateX(-8px);}
100%{transform:translateX(0);}
}

.feedback{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:clamp(32px,5vw,60px);
font-weight:900;
display:none;
z-index:50;
text-shadow:2px 2px 5px rgba(0,0,0,.3);
}

.good{
color:#2f9e44;
}

#finishScreen{
background:url("assets/background.png") center center/cover no-repeat;
text-align:center;
}

.finish-text{
font-size:clamp(40px,6vw,80px);
font-weight:900;
color:#ff6b6b;
text-shadow:2px 2px 5px rgba(0,0,0,.2);
margin-bottom:20px;
}

#playAgainBtn{
padding:16px 32px;
font-size:24px;
font-weight:bold;
border:none;
border-radius:18px;
background:#4dabf7;
color:white;
cursor:pointer;
}

canvas{
position:absolute;
inset:0;
pointer-events:none;
}

@media(max-width:700px){

.main-image{
width:50vw;
height:30vh;
}

.option{
width:38vw;
height:38vw;
}

.question{
font-size:18px;
}
}
</style>

</head>
<body>

<audio id="clapSound" src="assets/clap.mp3"></audio> <audio id="wrongSound" src="assets/wrong.mp3"></audio>

<!-- LOGO SCREEN -->

<div id="logoScreen" class="screen active">
<img src="assets/innovine-logo.png" alt="">
</div>

<!-- TITLE SCREEN -->

<div id="titleScreen" class="screen">

<h1 class="title">
<span>Sports</span>
<span>and</span>
<span>Games</span>
</h1>

<button id="startBtn">
👆 TAP TO START
</button>

</div>

<!-- GAME SCREEN -->

<div id="gameScreen" class="screen">

<h2 class="game-header">
<span>Sports</span>
<span>and</span>
<span>Games</span>
</h2>

<div class="question" id="questionText"></div>

<button class="listen-btn" id="listenBtn">
🔊 Hear Again
</button>

<img id="mainImage" class="main-image" src="" alt="">

<div class="options" id="optionsContainer"></div>

<div id="feedback" class="feedback good">
Good Job!
</div>

</div>

<!-- FINISH SCREEN -->

<div id="finishScreen" class="screen">

<canvas id="confettiCanvas"></canvas>

<div class="finish-text">
🎉 GREAT JOB! 🎉
</div>

<button id="playAgainBtn">
Play Again
</button>

</div>

<script>

/* ---------- SPLASH SCREENS ---------- */

const logoScreen=document.getElementById("logoScreen");
const titleScreen=document.getElementById("titleScreen");

setTimeout(()=>{
logoScreen.classList.remove("active");
titleScreen.classList.add("active");
},5000);

</script>

</body>
</html>
