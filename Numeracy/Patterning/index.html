<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patterning Game</title>
<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background: linear-gradient(135deg, #FFF2CC, #FFCCE5);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
}

#logo-screen, #game-screen, #end-screen {
    width: 100%;
    height: 100vh;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
}

#logo-screen img {
    width: 250px;
    height: auto;
}

h1 {
    font-size: 3vw;
    color: #FF4500;
    margin: 10px 0;
    text-shadow: 2px 2px #fff;
}

#question-text {
    font-size: 2vw;
    color: #0066CC;
    margin: 10px 0;
}

#instruction-text {
    font-size: 1.5vw;
    color: #333;
    margin-bottom: 10px;
}

.pattern-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px 0;
    flex-wrap: wrap;
}

.shape {
    width: 80px;
    height: 80px;
    border: 2px solid black;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    user-select: none;
}

.triangle {
    width: 0;
    height: 0;
    border-left: 40px solid transparent;
    border-right: 40px solid transparent;
    border-bottom: 70px solid white;
}

.circle {
    border-radius: 50%;
    background: white;
}

.square {
    background: white;
}

.diamond {
    width: 60px;
    height: 60px;
    background: white;
    transform: rotate(45deg);
}

.heart {
    position: relative;
    width: 60px;
    height: 60px;
    background: white;
    transform: rotate(-45deg);
}
.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 60px;
    height: 60px;
    background: white;
    border-radius: 50%;
}
.heart::before { top: -30px; left: 0; }
.heart::after { left: 30px; top: 0; }

#palette {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin: 20px 0;
}

.palette-color {
    width: 60px;
    height: 60px;
    cursor: grab;
    background-image: url('assets/df782756-4032-44c8-b54e-c0bededa7360.png');
    background-size: cover;
    border-radius: 50%;
}

.feedback {
    font-size: 2vw;
    margin: 10px 0;
    color: green;
}

button {
    padding: 10px 20px;
    font-size: 1.5rem;
    margin-top: 20px;
    cursor: pointer;
    border-radius: 10px;
    border: none;
    background: #FF69B4;
    color: #fff;
}

#confetti-canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
    width: 100%;
    height: 100%;
    z-index: 999;
}

</style>
</head>
<body>

<!-- Logo Screen -->
<div id="logo-screen">
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Screen -->
<div id="game-screen">
    <h1>Patterning</h1>
    <div id="question-text">Colour the shapes to complete the pattern</div>
    <div id="instruction-text">Drag the colours from the splash below onto the shapes in the row to complete the pattern</div>
    <div class="pattern-row" id="pattern-row"></div>
    <div id="palette"></div>
    <div class="feedback" id="feedback"></div>
</div>

<!-- End Screen -->
<div id="end-screen">
    <h1>Good Job! 🎉</h1>
    <button id="play-again">Play Again</button>
</div>

<canvas id="confetti-canvas"></canvas>

<audio id="right-sound" src="assets/correct.mp3"></audio>
<audio id="wrong-sound" src="assets/wrong.mp3"></audio>
<audio id="clap-sound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
// Round Data
const rounds = [
    {pattern:["yellow-triangle","blue-square","yellow-triangle","blue-square","plain-triangle","plain-square"], colors:["yellow","blue"]},
    {pattern:["orange-square","red-circle","orange-square","red-circle","plain-square","plain-circle"], colors:["orange","red"]},
    {pattern:["lightblue-square","lightgreen-triangle","lightblue-square","lightgreen-triangle","plain-square","plain-triangle"], colors:["lightblue","lightgreen"]},
    {pattern:["pink-diamond","yellow-diamond","pink-diamond","yellow-diamond","plain-diamond","plain-diamond"], colors:["pink","yellow"]},
    {pattern:["red-circle","blue-circle","red-circle","blue-circle","plain-circle","plain-circle"], colors:["red","blue"]},
    {pattern:["pink-square","purple-square","pink-square","purple-square","plain-square","plain-square"], colors:["pink","purple"]},
    {pattern:["pink-heart","yellow-triangle","pink-heart","yellow-triangle","plain-heart","plain-triangle"], colors:["pink","yellow"]}
];

let currentRound = 0;
let selectedColor = null;
let attemptCount = 0;

const logoScreen = document.getElementById('logo-screen');
const gameScreen = document.getElementById('game-screen');
const endScreen = document.getElementById('end-screen');
const patternRow = document.getElementById('pattern-row');
const paletteDiv = document.getElementById('palette');
const feedbackDiv = document.getElementById('feedback');
const rightSound = document.getElementById('right-sound');
const wrongSound = document.getElementById('wrong-sound');
const clapSound = document.getElementById('clap-sound');

// Splash logo
logoScreen.style.display = "flex";
setTimeout(()=>{
    logoScreen.style.display="none";
    startRound();
    gameScreen.style.display="flex";
},5000);

// Drag and drop helpers
function allowDrop(ev){ ev.preventDefault(); }
function drag(ev){ ev.dataTransfer.setData("text", ev.target.dataset.color); }
function drop(ev){
    ev.preventDefault();
    const color = ev.dataTransfer.getData("text");
    const target = ev.target;
    const plainType = target.dataset.plain;
    const correct = getCorrectColor(plainType);
    if(color===correct){
        target.style.backgroundColor = color;
        if(plainType.includes("triangle")) target.style.borderBottomColor = color;
        rightSound.play();
        feedbackDiv.textContent = "Good Job! ✅";
        attemptCount=0;
        checkRoundComplete();
    } else{
        wrongSound.play();
        attemptCount++;
        target.style.transform = "translateX(10px)";
        setTimeout(()=>{target.style.transform="translateX(0)";},200);
        if(attemptCount>=2){
            // Glow correct shapes
            document.querySelectorAll('[data-plain]').forEach(p=>{
                p.style.boxShadow = `0 0 10px 3px ${getCorrectColor(p.dataset.plain)}`;
            });
        }
    }
}

// Start a round
function startRound(){
    feedbackDiv.textContent="";
    attemptCount=0;
    patternRow.innerHTML="";
    paletteDiv.innerHTML="";
    if(currentRound>=rounds.length){
        gameScreen.style.display="none";
        endScreen.style.display="flex";
        runConfetti();
        return;
    }
    const round = rounds[currentRound];
    round.pattern.forEach(p=>{
        const shapeDiv = document.createElement('div');
        shapeDiv.className='shape';
        if(p.includes("triangle")) shapeDiv.classList.add('triangle');
        if(p.includes("circle")) shapeDiv.classList.add('circle');
        if(p.includes("square")) shapeDiv.classList.add('square');
        if(p.includes("diamond")) shapeDiv.classList.add('diamond');
        if(p.includes("heart")) shapeDiv.classList.add('heart');
        if(p.includes("plain")) shapeDiv.dataset.plain=p;
        shapeDiv.ondrop=drop;
        shapeDiv.ondragover=allowDrop;
        patternRow.appendChild(shapeDiv);
    });
    round.colors.forEach(col=>{
        const colDiv=document.createElement('div');
        colDiv.className='palette-color';
        colDiv.dataset.color=col;
        colDiv.draggable=true;
        colDiv.ondragstart=drag;
        // Tint using CSS filter for simplicity
        colDiv.style.filter = `drop-shadow(0 0 0 ${col})`;
        paletteDiv.appendChild(colDiv);
    });
}

function getCorrectColor(type){
    const round = rounds[currentRound];
    if(currentRound===0) return type.includes("triangle")?"yellow":"blue";
    if(currentRound===1) return type.includes("square")?"orange":"red";
    if(currentRound===2) return type.includes("square")?"lightblue":"lightgreen";
    if(currentRound===3) return type.includes("diamond") ? (patternRow.children[0].dataset.plain===type?"pink":"yellow"):"";
    if(currentRound===4) return type.includes("circle") ? (patternRow.children[0].dataset.plain===type?"red":"blue"):"";
    if(currentRound===5) return type.includes("square") ? (patternRow.children[0].dataset.plain===type?"pink":"purple"):"";
    if(currentRound===6) return type.includes("heart")?"pink":"yellow";
}

function checkRoundComplete(){
    const allDone = Array.from(patternRow.children).every(p=>{
        return p.dataset.plain ? (p.style.backgroundColor!="" && p.style.backgroundColor!="white") : true;
    });
    if(allDone){
        clapSound.play();
        setTimeout(()=>{currentRound++; startRound();},1000);
    }
}

// Play Again
document.getElementById('play-again').addEventListener('click',()=>{
    currentRound=0;
    endScreen.style.display="none";
    startRound();
    gameScreen.style.display="flex";
});

// Confetti
function runConfetti(){
    const canvas=document.getElementById('confetti-canvas');
    const ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    const confettis=[];
    for(let i=0;i<150;i++){
        confettis.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*6+4,dx:Math.random()*4-2,dy:Math.random()*4+2,color:`hsl(${Math.random()*360},100%,50%)`});
    }
    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        confettis.forEach(c=>{
            ctx.fillStyle=c.color;
            ctx.beginPath();
            ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
            ctx.fill();
            c.x+=c.dx;c.y+=c.dy;
            if(c.y>canvas.height){c.y=0;c.x=Math.random()*canvas.width;}
        });
        requestAnimationFrame(draw);
    }
    draw();
}
</script>
</body>
</html>
