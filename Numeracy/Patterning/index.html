<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Patterning Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:Arial,sans-serif;
overflow:hidden;
height:100vh;
background:linear-gradient(to bottom,#fff4c7,#dff7ff,#ffe4f2);
}

/* LOGO SCREEN */

#logoScreen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:#fff8de;
z-index:999;
}

#logoScreen img{
width:min(280px,65vw);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

/* TITLE SCREEN */

#titleScreen{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
background:linear-gradient(to bottom,#fff4c7,#dff7ff,#ffe4f2);
}

.gameTitle{
font-size:clamp(34px,6vw,60px);
color:#ff5c8a;
font-weight:bold;
text-shadow:2px 2px white;
}

.subTitle{
font-size:clamp(22px,4vw,38px);
color:#5b4bff;
font-weight:bold;
}

.startBtn{
padding:14px 30px;
font-size:24px;
border:none;
border-radius:18px;
background:#ffb703;
color:white;
cursor:pointer;
box-shadow:0 4px 0 #cc8e00;
}

/* GAME */

#gameContainer{
height:100vh;
display:flex;
flex-direction:column;
padding:8px;
align-items:center;
}

.header h1{
font-size:clamp(28px,5vw,46px);
color:#ff5c8a;
text-shadow:2px 2px white;
}

.roundInfo{
font-size:clamp(16px,3vw,24px);
color:#5b4bff;
font-weight:bold;
text-align:center;
margin-top:4px;
}

.questionBox{
margin-top:6px;
background:white;
width:95%;
max-width:900px;
border-radius:18px;
padding:10px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.questionText{
font-size:clamp(15px,2vw,22px);
line-height:1.4;
color:#444;
}

.listenBtn{
margin-top:8px;
padding:8px 16px;
font-size:16px;
border:none;
border-radius:12px;
background:#66c7ff;
color:white;
cursor:pointer;
}

/* PATTERN */

.patternArea{
flex:1;
display:flex;
justify-content:center;
align-items:center;
width:100%;
}

.patternRow{
width:100%;
max-width:1000px;
background:#ffffffcc;
border-radius:22px;
padding:12px;
display:flex;
justify-content:space-evenly;
align-items:center;
flex-wrap:wrap;
gap:10px;
box-shadow:0 5px 12px rgba(0,0,0,0.1);
}

.shape{
width:70px;
height:70px;
border:4px solid #333;
transition:0.3s;
}

.square{
border-radius:10px;
}

.circle{
border-radius:50%;
}

.diamond{
transform:rotate(45deg);
border-radius:8px;
}

.heart{
position:relative;
width:60px;
height:60px;
transform:rotate(-45deg);
border:none;
}

.heart:before,
.heart:after{
content:"";
position:absolute;
width:35px;
height:55px;
background:inherit;
border-radius:35px 35px 0 0;
border:4px solid #333;
}

.heart:before{
left:30px;
top:0;
}

.heart:after{
left:0;
top:-30px;
}

.blank{
outline:4px dashed #999;
}

/* PALETTE */

.palette{
display:flex;
justify-content:center;
gap:25px;
margin-top:10px;
margin-bottom:10px;
}

.colorBall{
width:70px;
height:70px;
border-radius:50%;
border:5px solid white;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
cursor:grab;
transition:0.2s;
touch-action:none;
position:relative;
z-index:5;
}

.dragging{
opacity:0.7;
transform:scale(1.15);
z-index:999;
}

/* FEEDBACK */

.feedback{
height:45px;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
font-weight:bold;
color:#27ae60;
}

/* ANIMATIONS */

.wiggle{
animation:wiggle 0.4s;
}

@keyframes wiggle{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

.correctGlow{
animation:glow 1s infinite;
}

@keyframes glow{
0%{box-shadow:0 0 0px gold;}
50%{box-shadow:0 0 18px gold;}
100%{box-shadow:0 0 0px gold;}
}

/* END SCREEN */

#endScreen{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
background:linear-gradient(to bottom,#fff4c7,#dff7ff,#ffe4f2);
text-align:center;
}

#endScreen h2{
font-size:clamp(34px,6vw,60px);
color:#ff5c8a;
}

#endScreen p{
font-size:clamp(22px,4vw,34px);
color:#5b4bff;
}

/* CONFETTI */

.confetti{
position:fixed;
width:12px;
height:12px;
border-radius:50%;
top:-20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
}
}

@media(max-width:600px){

.shape{
width:55px;
height:55px;
}

.colorBall{
width:60px;
height:60px;
}

.patternRow{
padding:8px;
gap:8px;
}

.questionBox{
padding:8px;
}

}

</style>
</head>

<body>

<audio id="rightSound" src="assets/right.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clap.mp3"></audio>

<!-- LOGO -->

<div id="logoScreen">
<img src="assets/innovine-logo.png">
</div>

<!-- TITLE -->

<div id="titleScreen" style="display:none;">

<div class="gameTitle">Patterning</div>

<div class="subTitle">Complete the Pattern</div>

<button class="startBtn" onclick="startGame()">Start Game</button>

</div>

<!-- GAME -->

<div id="gameContainer" style="display:none;">

<div class="header">
<h1>Patterning</h1>
<div class="roundInfo" id="roundInfo"></div>
</div>

<div class="questionBox">

<div class="questionText">
Look at the pattern. Colour the shape with correct colour to complete the pattern.
</div>

<button class="listenBtn" onclick="speakQuestion()">🔊 Hear Again</button>

</div>

<div class="patternArea">

<div class="patternRow" id="patternRow"></div>

</div>

<div class="palette" id="palette"></div>

<div class="feedback" id="feedback"></div>

</div>

<!-- END -->

<div id="endScreen" style="display:none;">

<h2>🎉 Great Job! 🎉</h2>

<p>You completed all the patterns!</p>

<button class="startBtn" onclick="restartGame()">Play Again</button>

</div>

<script>

const rounds = [

{
shapes:[
{type:"square", color:"yellow"},
{type:"square", color:"blue"},
{type:"square", color:"yellow"},
{type:"square", color:"blue"},
{type:"square", blank:true, answer:"yellow"},
{type:"square", blank:true, answer:"blue"}
],
palette:["yellow","blue"]
},

{
shapes:[
{type:"square", color:"orange"},
{type:"circle", color:"red"},
{type:"square", color:"orange"},
{type:"circle", color:"red"},
{type:"square", blank:true, answer:"orange"},
{type:"circle", blank:true, answer:"red"}
],
palette:["red","orange"]
},

{
shapes:[
{type:"square", color:"#7ad9ff"},
{type:"square", color:"#90ee90"},
{type:"square", color:"#7ad9ff"},
{type:"square", color:"#90ee90"},
{type:"square", blank:true, answer:"#7ad9ff"},
{type:"square", blank:true, answer:"#90ee90"}
],
palette:["#90ee90","#7ad9ff"]
},

{
shapes:[
{type:"diamond", color:"pink"},
{type:"diamond", color:"yellow"},
{type:"diamond", color:"pink"},
{type:"diamond", color:"yellow"},
{type:"diamond", blank:true, answer:"pink"},
{type:"diamond", blank:true, answer:"yellow"}
],
palette:["pink","yellow"]
},

{
shapes:[
{type:"circle", color:"red"},
{type:"circle", color:"blue"},
{type:"circle", color:"red"},
{type:"circle", color:"blue"},
{type:"circle", blank:true, answer:"red"},
{type:"circle", blank:true, answer:"blue"}
],
palette:["red","blue"]
},

{
shapes:[
{type:"square", color:"pink"},
{type:"square", color:"purple"},
{type:"square", color:"pink"},
{type:"square", color:"purple"},
{type:"square", blank:true, answer:"pink"},
{type:"square", blank:true, answer:"purple"}
],
palette:["pink","purple"]
},

{
shapes:[
{type:"heart", color:"pink"},
{type:"square", color:"yellow"},
{type:"heart", color:"pink"},
{type:"square", color:"yellow"},
{type:"heart", blank:true, answer:"pink"},
{type:"square", blank:true, answer:"yellow"}
],
palette:["pink","yellow"]
}

];

let currentRound = 0;
let completedTargets = 0;
let wrongAttempts = 0;

const patternRow = document.getElementById("patternRow");
const palette = document.getElementById("palette");
const feedback = document.getElementById("feedback");
const roundInfo = document.getElementById("roundInfo");

const question =
"Look at the pattern. Colour the shape with correct colour to complete the pattern.";

window.onload = ()=>{

setTimeout(()=>{

document.getElementById("logoScreen").style.display="none";

document.getElementById("titleScreen").style.display="flex";

},5000);

};

function startGame(){

document.getElementById("titleScreen").style.display="none";

document.getElementById("gameContainer").style.display="flex";

loadRound();

}

function loadRound(){

completedTargets=0;
wrongAttempts=0;

feedback.innerHTML="";
patternRow.innerHTML="";
palette.innerHTML="";

roundInfo.innerText=
`Round ${currentRound+1} / ${rounds.length}`;

speakQuestion();

const round = rounds[currentRound];

round.shapes.forEach(shapeData=>{

const shape=document.createElement("div");

shape.classList.add("shape",shapeData.type);

if(shapeData.type!=="heart"){
shape.style.background=
shapeData.blank ? "white" : shapeData.color;
}else{
shape.style.background=
shapeData.blank ? "white" : shapeData.color;
}

if(shapeData.blank){

shape.classList.add("blank");

shape.dataset.answer=shapeData.answer;

shape.addEventListener("dragover",(e)=>{
e.preventDefault();
});

shape.addEventListener("drop",(e)=>{

e.preventDefault();

const draggedColor =
e.dataTransfer.getData("color");

checkAnswer(shape, draggedColor);

});

}

patternRow.appendChild(shape);

});

round.palette.forEach(color=>{

const ball=document.createElement("div");

ball.classList.add("colorBall");

ball.style.background=color;

/* DESKTOP DRAG */

ball.draggable = true;

ball.addEventListener("dragstart",(e)=>{

e.dataTransfer.setData("color",color);

});

/* MOBILE TOUCH DRAG */

let startX = 0;
let startY = 0;

ball.addEventListener("touchstart",(e)=>{

ball.classList.add("dragging");

startX = e.touches[0].clientX;
startY = e.touches[0].clientY;

});

ball.addEventListener("touchmove",(e)=>{

e.preventDefault();

const touch = e.touches[0];

ball.style.left =
(touch.clientX - startX) + "px";

ball.style.top =
(touch.clientY - startY) + "px";

});

ball.addEventListener("touchend",(e)=>{

ball.classList.remove("dragging");

const touch = e.changedTouches[0];

const target =
document.elementFromPoint(
touch.clientX,
touch.clientY
);

if(
target &&
target.classList.contains("blank")
){

checkAnswer(target,color);

}

ball.style.left = "0px";
ball.style.top = "0px";

});

palette.appendChild(ball);

});

}

function checkAnswer(shape,color){

if(shape.dataset.done) return;

const correct=shape.dataset.answer;

if(color===correct){

shape.style.background=color;

shape.classList.remove("blank");

shape.dataset.done=true;

document.getElementById("rightSound").play();

completedTargets++;

feedback.innerHTML="✅ Good Job!";

if(completedTargets===2){

document.getElementById("clapSound").play();

setTimeout(()=>{

currentRound++;

if(currentRound>=rounds.length){

endGame();

}else{

loadRound();

}

},1600);

}

}else{

wrongAttempts++;

document.getElementById("wrongSound").play();

shape.classList.add("wiggle");

setTimeout(()=>{
shape.classList.remove("wiggle");
},400);

if(wrongAttempts>=2){

document.querySelectorAll(".blank")
.forEach(t=>{

if(!t.dataset.done){

t.classList.add("correctGlow");

setTimeout(()=>{
t.classList.remove("correctGlow");
},2500);

}

});

}

}

}

function speakQuestion(){

speechSynthesis.cancel();

const speech=
new SpeechSynthesisUtterance(question);

speech.rate=0.9;
speech.pitch=1;

speechSynthesis.speak(speech);

}

function endGame(){

document.getElementById("gameContainer")
.style.display="none";

document.getElementById("endScreen")
.style.display="flex";

createConfetti();

}

function createConfetti(){

for(let i=0;i<120;i++){

const confetti=document.createElement("div");

confetti.classList.add("confetti");

confetti.style.left=Math.random()*100+"vw";

confetti.style.background=
["#ff5c8a","#ffb703","#5b4bff","#66c7ff","#90ee90"]
[Math.floor(Math.random()*5)];

confetti.style.animationDuration=
(Math.random()*3+2)+"s";

document.body.appendChild(confetti);

setTimeout(()=>{
confetti.remove();
},5000);

}

}

function restartGame(){

currentRound=0;

document.getElementById("endScreen")
.style.display="none";

document.getElementById("gameContainer")
.style.display="flex";

loadRound();

}

</script>

</body>
</html>
