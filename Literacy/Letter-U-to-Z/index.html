<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Letters U to Z</title>
<style>
*{box-sizing:border-box} html,body{margin:0;height:100%;font-family:Arial,sans-serif;overflow:hidden}
body{background:linear-gradient(135deg,#ffe8a3,#b8e6ff,#ffd4e5)}
.screen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
.hidden{display:none}
#logo img{max-width:300px;width:60%}
.flash{animation:flash 1s infinite}
@keyframes flash{50%{opacity:.4}}
h1{margin:5px;color:#5a3d9a}
#question{font-size:clamp(14px,2vw,24px);font-weight:bold}
.top{
height:14%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.game{
height:86%;
position:relative;
}

.board{
position:relative;
width:100%;
height:calc(100vh - 120px);
}

#svg{
position:absolute;
inset:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}


#letters{
position:absolute;
top:20px;
left:0;
right:0;
display:flex;
justify-content:space-evenly;
align-items:center;
z-index:2;
}

#images{
position:absolute;
bottom:30px;
left:0;
right:0;
display:flex;
justify-content:space-evenly;
align-items:center;
z-index:2;

min-height:100px;
}

#images{
margin-bottom:10px;
}

.letters-row,
.images-row{
width:100%;
display:flex;
justify-content:space-evenly;
align-items:center;
z-index:2;
}


.item{
background:#fff;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,.2);
cursor:pointer;
}

#letters .item{
background:transparent;
box-shadow:none;
border:none;
width:55px;
height:55px;
padding:0;
}

#letters .item img{
max-width:100%;
max-height:100%;
}

#images .item{
width:85px;
height:85px;
}
.item img{
max-width:85%;
max-height:85%;
object-fit:contain;
}
#svg{
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}
svg{position:absolute;inset:0;width:100%;height:100%}
.selected{
transform:scale(1.15);
filter:drop-shadow(0 0 10px orange);
}
.matched{opacity:.6}
.shake{animation:shake .3s}
@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.glow{animation:glow 1s infinite}
@keyframes glow{50%{box-shadow:0 0 20px gold}}
button{padding:8px 14px;border:none;border-radius:10px;background:#5a3d9a;color:#fff}
#msg{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:40px;font-weight:bold;color:#0a8a0a;display:none}
#end h1{font-size:50px}
.confetti{position:absolute;width:10px;height:10px;animation:fall 4s linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style>
</head>
<body>

<div id="logo" class="screen">
<img src="assets/innovine-logo.png">
</div>

<div id="title" class="screen hidden">
<h1 class="flash" style="font-size:60px">Letters U to Z</h1>
</div>

<div id="main" class="hidden">
<div class="top">
<h1>Letters U to Z</h1>
<div id="question">Identify the letter, match the picture that starts with that corresponding letter.</div>
<button onclick="speakInstruction()">🔊 Hear Again</button>
</div>
<div class="game">
<div id="msg">Good Job!</div>
<div class="board">

    <svg id="svg"></svg>

    <div id="letters"></div>

    <div id="images"></div>

</div>
</div>
</div>

<div id="end" class="screen hidden">
<h1>🎉 Well Done! 🎉</h1>
<button onclick="location.reload()">Play Again</button>
</div>

<audio id="clap" src="assets/clap.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="correct" src="assets/correct.mp3"></audio>

<script>
const rounds=[
{
letters:["U","V","W","X","Y","Z"],
images:["web.png","x-ray.jpg","zoo.png","umbrella.png","van.png","yoyo.png"],
map:{U:"umbrella.png",V:"van.png",W:"web.png",X:"x-ray.jpg",Y:"yoyo.png",Z:"zoo.png"}
},
{
letters:["U","V","W","X","Y","Z"],
images:["xmastree.png","yatch.png","unicycle.png","vase.png","zebra.png","watch.png"],
map:{U:"unicycle.png",V:"vase.png",W:"watch.png",X:"xmastree.png",Y:"yatch.png",Z:"zebra.png"}
},
{
letters:["U","V","W","X","Y","Z"],
images:["watermelon.png","yak.png","umpire.png","xylophone.png","zip.png","vegetable.png"],
map:{U:"umpire.png",V:"vegetable.png",W:"watermelon.png",X:"xylophone.png",Y:"yak.png",Z:"zip.png"}
}
];

let round=0,selected=null,matches=0,wrongCount={};

function speakInstruction(){
let u=new SpeechSynthesisUtterance("Identify the letter, match the picture that starts with that corresponding letter.");
u.rate=.9;
speechSynthesis.cancel();
speechSynthesis.speak(u);
}

setTimeout(()=>{
logo.classList.add('hidden');
title.classList.remove('hidden');
setTimeout(()=>{
title.classList.add('hidden');
main.classList.remove('hidden');
loadRound();
speakInstruction();
},5000);
},5000);

function loadRound(){
matches=0;
selected=null;
wrongCount={};
letters.innerHTML="";
images.innerHTML="";
svg.innerHTML="";

let r=rounds[round];

r.letters.forEach(l=>{
let d=document.createElement("div");
d.className="item";
d.dataset.letter=l;
d.innerHTML=`<img src="assets/${l}.png">`;
d.onclick=()=>selectLetter(d);
letters.appendChild(d);
});

r.images.sort(()=>Math.random()-0.5).forEach(img=>{
let d=document.createElement("div");
d.className="item";
d.dataset.img=img;
d.innerHTML=`<img src="assets/${img}">`;
d.onclick=()=>selectImage(d);
images.appendChild(d);
});
}

function selectLetter(el){
if(el.classList.contains("matched"))return;
document.querySelectorAll("#letters .item").forEach(x=>x.classList.remove("selected"));
selected=el;
el.classList.add("selected");
}

function selectImage(img){
if(!selected || img.classList.contains("matched")) return;
const letter=selected.dataset.letter;
const correct=rounds[round].map[letter];

if(correct===img.dataset.img){
drawLine(selected,img);
selected.classList.add("matched");
img.classList.add("matched");
selected.classList.remove("selected");
document.getElementById("correct").play();
selected=null;
matches++;
if(matches===6) roundComplete();
}else{
document.getElementById("wrong").play();
img.classList.add("shake");
setTimeout(()=>img.classList.remove("shake"),300);

wrongCount[letter]=(wrongCount[letter]||0)+1;
if(wrongCount[letter]>=2){
document.querySelectorAll("#images .item").forEach(i=>{
if(i.dataset.img===correct) i.classList.add("glow");
});
}
}
}

function drawLine(a,b){
const s=svg.getBoundingClientRect();
const r1=a.getBoundingClientRect();
const r2=b.getBoundingClientRect();
let x1=r1.left+r1.width/2-s.left;
let y1=r1.bottom-s.top;

let x2=r2.left+r2.width/2-s.left;
let y2=r2.top-s.top;
svg.innerHTML+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="green" stroke-width="6"/>`;
}

function roundComplete(){
msg.style.display="block";
clap.play();
setTimeout(()=>{
msg.style.display="none";
round++;
if(round<rounds.length){
loadRound();
}else{
finishGame();
}
},2500);
}

function finishGame(){
main.classList.add("hidden");
end.classList.remove("hidden");
for(let i=0;i<120;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.top="-20px";
c.style.background=`hsl(${Math.random()*360},80%,60%)`;
c.style.animationDelay=Math.random()*2+"s";
document.body.appendChild(c);
}
clap.play();
}
</script>
</body>
</html>
