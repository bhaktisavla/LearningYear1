<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Feed The Letter Monster</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
font-family:'Arial Rounded MT Bold',sans-serif;
touch-action:none;

background:
linear-gradient(to bottom,
#73d8ff 0%,
#b9f2ff 45%,
#9be56a 45%,
#6fd84e 100%);
}

/* BACKGROUND */

.cloud{
position:absolute;
background:white;
border-radius:50%;
opacity:0.9;
}

.cloud1{
width:170px;
height:80px;
top:20px;
left:20px;
}

.cloud2{
width:190px;
height:90px;
top:30px;
right:20px;
}

.cloud::before{
content:'';
position:absolute;
background:white;
border-radius:50%;
}

.cloud1::before{
width:90px;
height:90px;
top:-20px;
left:25px;
}

.cloud2::before{
width:100px;
height:100px;
top:-25px;
left:45px;
}

.hill{
position:absolute;
bottom:-120px;
width:450px;
height:260px;
border-radius:50%;
}

.hill1{
left:-100px;
background:#93df5b;
}

.hill2{
right:-100px;
background:#78d14d;
}

/* LOGO */

#logoScreen{
position:absolute;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

#logoScreen img{
width:min(70vw,280px);
}

/* GAME */

#game{
width:100vw;
height:100vh;
position:relative;
overflow:hidden;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
padding:10px;
}

.active{
display:flex;
}

/* TITLE */

.title{
font-size:min(12vw,80px);
font-weight:bold;
color:#ff4fa0;

text-shadow:
0 0 10px white,
0 4px 0 #d63384;

text-align:center;

margin-bottom:20px;
}

/* BUTTON */

.play-btn{
padding:16px 34px;

font-size:min(7vw,34px);

border:none;
border-radius:24px;

font-weight:bold;
color:white;

background:
linear-gradient(to bottom,
#ffd54f,
#ff9800);

cursor:pointer;

box-shadow:
0 5px 0 #d67d00,
0 10px 15px rgba(0,0,0,0.2);
}

/* INSTRUCTION */

.instruction{
background:white;

padding:12px 20px;

border-radius:22px;

font-size:min(5vw,28px);

font-weight:bold;

text-align:center;

margin-bottom:15px;

box-shadow:
0 5px 12px rgba(0,0,0,0.18);

max-width:92%;
}

/* MONSTER */

#monsterArea{
position:relative;
width:100%;
height:38vh;

display:flex;
justify-content:center;
align-items:center;
}

#monster{
width:min(58vw,280px);
position:relative;
}

/* LETTER ON BELLY */

#monsterLetter{
position:absolute;

left:50%;
top:56%;

transform:translate(-50%,-50%);

font-size:min(16vw,90px);

font-weight:bold;

color:white;

text-shadow:
0 0 8px black;
}

/* MOUTH DROP ZONE */

#mouthZone{
position:absolute;

left:50%;
top:67%;

transform:translateX(-50%);

width:36%;
height:16%;

border-radius:40px;

}

/* PICTURES AREA */

#pictureArea{
position:relative;
width:100%;
height:55vh;
}

/* DRAG IMAGES */

.picture{
position:absolute;

width:min(18vw,95px);

touch-action:none;

user-select:none;

cursor:grab;

transition:transform 0.2s;
}

.picture:active{
transform:scale(1.08);
}

/* FINAL */

#finalScreen{
background:
linear-gradient(to bottom,
#002d62,
#00152d);
}

/* CONFETTI */

.confetti{
position:absolute;
width:8px;
height:8px;
animation:fall linear infinite;
}

@keyframes fall{
from{
transform:translateY(-100px) rotate(0deg);
}
to{
transform:translateY(110vh) rotate(360deg);
}
}

</style>
</head>

<body>

<!-- BACKGROUND -->

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<div class="hill hill1"></div>
<div class="hill hill2"></div>

<!-- LOGO -->

<div id="logoScreen">

<img src="assets/innovine-logo.png">

</div>

<!-- AUDIO -->

<audio id="correctSound"
src="assets/correct.mp3"></audio>

<audio id="wrongSound"
src="assets/wrong.mp3"></audio>

<!-- GAME -->

<div id="game">

<!-- START -->

<div class="screen active"
id="startScreen">

<div class="title">
Feed The Letter Monster
</div>

<button class="play-btn"
onclick="startGame()">
Play
</button>

</div>

<!-- GAME SCREEN -->

<div class="screen"
id="gameScreen">

<div class="instruction"
id="instruction">
Feed pictures that start with A
</div>

<!-- MONSTER -->

<div id="monsterArea">

<div style="position:relative;">

<img src="assets/monster.png"
id="monster">

<div id="monsterLetter">
A
</div>

<div id="mouthZone"></div>

</div>

</div>

<!-- PICTURES -->

<div id="pictureArea"></div>

</div>

<!-- FINAL -->

<div class="screen"
id="finalScreen">

<div id="confettiArea"></div>

<div class="title">
Great Job!
</div>

<div class="instruction">
You fed all the letters
</div>

<button class="play-btn"
onclick="restartGame()">
Play again
</button>

</div>

</div>

<script>

/* LEVELS */

const levels=[

{
letter:'A',
correct:[
'assets/apple.png',
'assets/ant.png',
'assets/alligator.png',
'assets/aeroplane.png',
'assets/axe.png'
],
wrong:[
'assets/ball.png',
'assets/car.png',
'assets/dog.png'
]
},

{
letter:'B',
correct:[
'assets/bag.png',
'assets/ball.png',
'assets/balloon.png',
'assets/bat.png',
'assets/bear.png'
],
wrong:[
'assets/apple.png',
'assets/car.png',
'assets/dog.png'
]
},

{
letter:'C',
correct:[
'assets/cake.png',
'assets/cap.png',
'assets/car.png',
'assets/carrot.png',
'assets/cat.png'
],
wrong:[
'assets/apple.png',
'assets/doll.png',
'assets/dog.png'
]
},

{
letter:'D',
correct:[
'assets/dog.png',
'assets/doll.png',
'assets/door.png',
'assets/duckling.png',
'assets/dum.png'
],
wrong:[
'assets/apple.png',
'assets/car.png',
'assets/bag.png'
]
}

];

let currentLevel=0;
let completed=0;

/* LOGO */

window.onload=()=>{

setTimeout(()=>{

document.getElementById('logoScreen')
.style.display='none';

},5000);

}

/* AUDIO */

function playCorrect(){

let s=
document.getElementById('correctSound');

s.currentTime=0;

s.play();

setTimeout(()=>{

s.pause();
s.currentTime=0;

},700);

}

function playWrong(){

let s=
document.getElementById('wrongSound');

s.currentTime=0;

s.play();

}

/* START */

function startGame(){

document.getElementById('startScreen')
.classList.remove('active');

document.getElementById('gameScreen')
.classList.add('active');

currentLevel=0;

loadLevel();

}

/* LOAD LEVEL */

function loadLevel(){

completed=0;

let level=levels[currentLevel];

document.getElementById('monsterLetter')
.innerHTML=level.letter;

document.getElementById('instruction')
.innerHTML=
'Feed pictures that start with '+level.letter;

let area=
document.getElementById('pictureArea');

area.innerHTML='';

let images=[
...level.correct,
...level.wrong
];

/* SHUFFLE */

images.sort(()=>Math.random()-0.5);

images.forEach((img,index)=>{

let pic=
document.createElement('img');

pic.src=img;

pic.className='picture';

pic.draggable=false;

/* POSITION IMAGES BELOW MONSTER */

pic.style.left=
(5+(index%4)*22)+'vw';

pic.style.top=
(5+Math.floor(index/4)*22)+'vh';

area.appendChild(pic);

makeDraggable(pic,img);

});

}

/* DRAG */

function makeDraggable(element,img){

let offsetX=0;
let offsetY=0;

function startDrag(e){

e.preventDefault();

let touch=
e.touches ? e.touches[0] : e;

offsetX=
touch.clientX-
element.offsetLeft;

offsetY=
touch.clientY-
element.offsetTop;

document.addEventListener(
'mousemove',
drag
);

document.addEventListener(
'touchmove',
drag,
{passive:false}
);

document.addEventListener(
'mouseup',
endDrag
);

document.addEventListener(
'touchend',
endDrag
);

}

function drag(e){

e.preventDefault();

let touch=
e.touches ? e.touches[0] : e;

element.style.left=
(touch.clientX-offsetX)+'px';

element.style.top=
(touch.clientY-offsetY)+'px';

}

function endDrag(){

document.removeEventListener(
'mousemove',
drag
);

document.removeEventListener(
'touchmove',
drag
);

checkDrop(element,img);

}

element.addEventListener(
'mousedown',
startDrag
);

element.addEventListener(
'touchstart',
startDrag,
{passive:false}
);

}

/* CHECK DROP */

function checkDrop(element,img){

let mouth=
document.getElementById('mouthZone');

let mouthRect=
mouth.getBoundingClientRect();

let imgRect=
element.getBoundingClientRect();

let level=
levels[currentLevel];

let hit=
!(

imgRect.right < mouthRect.left ||

imgRect.left > mouthRect.right ||

imgRect.bottom < mouthRect.top ||

imgRect.top > mouthRect.bottom

);

if(hit){

if(level.correct.includes(img)){

playCorrect();

element.style.transition='all 0.5s';

element.style.opacity='0';

element.style.transform='scale(0.2)';

completed++;

setTimeout(()=>{

element.remove();

},500);

if(completed>=level.correct.length){

setTimeout(()=>{

nextLevel();

},900);

}

}else{

playWrong();

/* RESET POSITION */

element.style.left='10vw';
element.style.top='40vh';

}

}

}

/* NEXT */

function nextLevel(){

currentLevel++;

if(currentLevel>=levels.length){

endGame();

}else{

loadLevel();

}

}

/* END */

function endGame(){

document.getElementById('gameScreen')
.classList.remove('active');

document.getElementById('finalScreen')
.classList.add('active');

createConfetti();

}

/* CONFETTI */

function createConfetti(){

let area=
document.getElementById('confettiArea');

area.innerHTML='';

let colors=[
'#ff4081',
'#2196f3',
'#4caf50',
'#ffeb3b',
'#ff9800',
'#9c27b0'
];

for(let i=0;i<120;i++){

let paper=
document.createElement('div');

paper.className='confetti';

paper.style.left=
Math.random()*100+'vw';

paper.style.background=
colors[
Math.floor(
Math.random()*colors.length
)
];

paper.style.animationDuration=
(2+Math.random()*3)+'s';

paper.style.width=
(4+Math.random()*6)+'px';

paper.style.height=
(4+Math.random()*6)+'px';

area.appendChild(paper);

}

}

/* RESTART */

function restartGame(){

document.getElementById('finalScreen')
.classList.remove('active');

document.getElementById('gameScreen')
.classList.add('active');

currentLevel=0;

loadLevel();

}

</script>

</body>
</html>
