<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Feed The Monster</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:'Arial Rounded MT Bold',sans-serif;
touch-action:none;
background:#8fe3ff;
}

/* BACKGROUND */

body{
background:
linear-gradient(to bottom,
#75d8ff 0%,
#b8f0ff 40%,
#7ed957 40%,
#49b04a 100%);
}

/* SUN */

.sun{
position:absolute;
top:15px;
right:15px;
width:80px;
height:80px;
background:#ffd93d;
border-radius:50%;
box-shadow:0 0 30px #ffd93d;
z-index:1;
}

/* CLOUDS */

.cloud{
position:absolute;
background:white;
border-radius:50%;
opacity:0.95;
}

.cloud1{
width:140px;
height:60px;
top:25px;
left:15px;
}

.cloud2{
width:150px;
height:65px;
top:45px;
right:90px;
}

.cloud::before{
content:'';
position:absolute;
background:white;
border-radius:50%;
}

.cloud1::before{
width:70px;
height:70px;
top:-20px;
left:25px;
}

.cloud2::before{
width:80px;
height:80px;
top:-22px;
left:35px;
}

/* TREES */

.tree{
position:absolute;
bottom:0;
width:100px;
height:240px;
z-index:1;
}

.tree .trunk{
position:absolute;
bottom:0;
left:35px;
width:30px;
height:120px;
background:#8b5a2b;
border-radius:10px;
}

.tree .leaf{
position:absolute;
width:95px;
height:95px;
background:#2ecc71;
border-radius:50%;
}

.tree .leaf1{
top:0;
left:3px;
}

.tree .leaf2{
top:35px;
left:-12px;
}

.tree .leaf3{
top:35px;
left:20px;
}

.tree1{
left:-10px;
}

.tree2{
right:-10px;
}

/* FLOWERS */

.flower{
position:absolute;
bottom:8px;
font-size:28px;
animation:bounce 2s infinite;
z-index:1;
}

.fl1{left:10%;}
.fl2{left:28%;}
.fl3{right:20%;}
.fl4{right:8%;}

@keyframes bounce{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-8px);
}
}

/* LOGO */

#logoScreen{
position:absolute;
inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#logoScreen img{
width:min(70vw,260px);
}

/* GAME */

#game{
position:relative;
width:100%;
height:100%;
overflow:hidden;
}

/* SCREENS */

.screen{
position:absolute;
inset:0;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
padding:10px;
}

.active{
display:flex;
}

/* TITLE */

.title{
font-size:min(11vw,60px);
font-weight:bold;
color:#ff4fa0;
text-shadow:
0 0 10px white,
0 5px 0 #d63384;
text-align:center;
margin-bottom:20px;
z-index:2;
}

/* BUTTON */

.play-btn{
padding:14px 30px;
font-size:min(6vw,30px);
border:none;
border-radius:22px;
font-weight:bold;
color:white;
background:
linear-gradient(to bottom,
#ffcf33,
#ff8c00);
cursor:pointer;
box-shadow:
0 5px 0 #d67d00,
0 10px 15px rgba(0,0,0,0.2);
z-index:2;
}

/* INSTRUCTION */

.instruction{
background:white;
padding:10px 16px;
border-radius:20px;
font-size:min(4.8vw,24px);
font-weight:bold;
text-align:center;
margin-top:8px;
margin-bottom:6px;
box-shadow:
0 5px 12px rgba(0,0,0,0.18);
max-width:95%;
z-index:2;
}

/* MONSTER AREA */

#monsterArea{
position:relative;
width:100%;
height:38vh;
display:flex;
justify-content:center;
align-items:center;
z-index:2;
}

#monsterContainer{
position:relative;
}

/* MONSTER */

#monster{
width:min(52vw,240px);
pointer-events:none;
}

/* LETTER */

#monsterLetter{
position:absolute;
left:50%;
top:63%;
transform:translate(-50%,-50%);
font-size:min(14vw,80px);
font-weight:bold;
color:#ff1744;
text-shadow:
0 0 10px white,
0 0 14px white;
pointer-events:none;
}

/* BIGGER MOUTH ZONE */

#mouthZone{
position:absolute;
left:50%;
top:28%;
transform:translateX(-50%);
width:42%;
height:22%;
border-radius:50px;
}

/* OBJECT AREA */

#pictureArea{
position:relative;
width:100%;
height:55vh;
z-index:2;
}

/* DRAG OBJECTS */

.picture{
position:absolute;
width:min(18vw,85px);
max-width:85px;
touch-action:none;
user-select:none;
cursor:grab;
transition:transform 0.2s;
}

.picture:active{
transform:scale(1.08);
}

/* FINAL */

#finalScreen{
background:
linear-gradient(to bottom,
#002d62,
#00152d);
}

/* CONFETTI */

.confetti{
position:absolute;
width:8px;
height:8px;
animation:fall linear infinite;
}

@keyframes fall{

from{
transform:translateY(-100px) rotate(0deg);
}

to{
transform:translateY(110vh) rotate(360deg);
}

}

</style>
</head>

<body>

<!-- BACKGROUND -->

<div class="sun"></div>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<div class="tree tree1">
<div class="trunk"></div>
<div class="leaf leaf1"></div>
<div class="leaf leaf2"></div>
<div class="leaf leaf3"></div>
</div>

<div class="tree tree2">
<div class="trunk"></div>
<div class="leaf leaf1"></div>
<div class="leaf leaf2"></div>
<div class="leaf leaf3"></div>
</div>

<div class="flower fl1">🌸</div>
<div class="flower fl2">🌼</div>
<div class="flower fl3">🌻</div>
<div class="flower fl4">🌺</div>

<!-- LOGO -->

<div id="logoScreen">
<img src="assets/innovine-logo.png">
</div>

<!-- AUDIO -->

<audio id="correctSound"
src="assets/freesound_community-claps-44774.mp3"></audio>

<audio id="wrongSound"
src="assets/wrong.mp3"></audio>

<!-- GAME -->

<div id="game">

<!-- START -->

<div class="screen active"
id="startScreen">

<div class="title">
Feed The Monster
</div>

<button class="play-btn"
onclick="startGame()">
Play
</button>

</div>

<!-- GAME SCREEN -->

<div class="screen"
id="gameScreen">

<div class="instruction"
id="instruction">
Feed the monster with letter A objects
</div>

<!-- MONSTER -->

<div id="monsterArea">

<div id="monsterContainer">

<img src="assets/monster.png"
id="monster">

<div id="monsterLetter">
A
</div>

<div id="mouthZone"></div>

</div>

</div>

<!-- OBJECTS -->

<div id="pictureArea"></div>

</div>

<!-- FINAL -->

<div class="screen"
id="finalScreen">

<div id="confettiArea"></div>

<div class="title">
Great Job!
</div>

<div class="instruction">
You fed all the letters
</div>

<button class="play-btn"
onclick="restartGame()">
Play again
</button>

</div>

</div>

<script>

/* LEVELS */

const levels=[

{
letter:'A',
correct:[
'assets/apple.png',
'assets/ant.png',
'assets/alligator.png',
'assets/aeroplane.png',
'assets/axe.png'
],
wrong:[
'assets/ball.png',
'assets/car.png',
'assets/dog.png'
]
},

{
letter:'B',
correct:[
'assets/bag.png',
'assets/ball.png',
'assets/balloon.png',
'assets/bat.png',
'assets/bear.png'
],
wrong:[
'assets/apple.png',
'assets/car.png',
'assets/dog.png'
]
},

{
letter:'C',
correct:[
'assets/cake.png',
'assets/cap.png',
'assets/car.png',
'assets/carrot.png',
'assets/cat.png'
],
wrong:[
'assets/apple.png',
'assets/doll.png',
'assets/dog.png'
]
},

{
letter:'D',
correct:[
'assets/dog.png',
'assets/doll.png',
'assets/door.png',
'assets/duckling.png',
'assets/dum.png'
],
wrong:[
'assets/apple.png',
'assets/car.png',
'assets/bag.png'
]
}

];

let currentLevel=0;
let completed=0;

/* LOGO */

window.onload=()=>{

setTimeout(()=>{

document.getElementById('logoScreen')
.style.display='none';

},5000);

}

/* SOUNDS */

function playCorrect(){

let s=
document.getElementById('correctSound');

s.currentTime=0;
s.play();

setTimeout(()=>{

s.pause();
s.currentTime=0;

},1200);

}

function playWrong(){

let s=
document.getElementById('wrongSound');

s.currentTime=0;
s.play();

}

/* START */

function startGame(){

document.getElementById('startScreen')
.classList.remove('active');

document.getElementById('gameScreen')
.classList.add('active');

currentLevel=0;

loadLevel();

}

/* LOAD LEVEL */

function loadLevel(){

completed=0;

let level=levels[currentLevel];

document.getElementById('monsterLetter')
.innerHTML=level.letter;

document.getElementById('instruction')
.innerHTML=
'Feed the monster with letter '+
level.letter+
' objects';

let area=
document.getElementById('pictureArea');

area.innerHTML='';

let images=[
...level.correct,
...level.wrong
];

images.sort(()=>Math.random()-0.5);

images.forEach((img,index)=>{

let pic=
document.createElement('img');

pic.src=img;

pic.className='picture';

pic.draggable=false;

/* BETTER MOBILE POSITIONS */

let col=index%4;
let row=Math.floor(index/4);

pic.dataset.startX=
(5 + col*22);

pic.dataset.startY=
(2 + row*18);

pic.style.left=
pic.dataset.startX+'vw';

pic.style.top=
pic.dataset.startY+'vh';

area.appendChild(pic);

makeDraggable(pic,img);

});

}

/* DRAG */

function makeDraggable(element,img){

let offsetX=0;
let offsetY=0;

function startDrag(e){

e.preventDefault();

let touch=
e.touches ? e.touches[0] : e;

offsetX=
touch.clientX-
element.getBoundingClientRect().left;

offsetY=
touch.clientY-
element.getBoundingClientRect().top;

document.addEventListener(
'mousemove',
drag
);

document.addEventListener(
'touchmove',
drag,
{passive:false}
);

document.addEventListener(
'mouseup',
endDrag
);

document.addEventListener(
'touchend',
endDrag
);

}

function drag(e){

e.preventDefault();

let touch=
e.touches ? e.touches[0] : e;

element.style.left=
(touch.clientX-offsetX)+'px';

element.style.top=
(touch.clientY-offsetY)+'px';

}

function endDrag(){

document.removeEventListener(
'mousemove',
drag
);

document.removeEventListener(
'touchmove',
drag
);

checkDrop(element,img);

}

element.addEventListener(
'mousedown',
startDrag
);

element.addEventListener(
'touchstart',
startDrag,
{passive:false}
);

}

/* CHECK DROP */

function checkDrop(element,img){

let mouth=
document.getElementById('mouthZone');

let mouthRect=
mouth.getBoundingClientRect();

let imgRect=
element.getBoundingClientRect();

let level=
levels[currentLevel];

/* BIGGER HIT AREA */

let hit=

imgRect.left <
mouthRect.right + 20 &&

imgRect.right >
mouthRect.left - 20 &&

imgRect.top <
mouthRect.bottom + 20 &&

imgRect.bottom >
mouthRect.top - 20;

if(hit){

if(level.correct.includes(img)){

playCorrect();

element.style.transition='all 0.5s';

element.style.opacity='0';

element.style.transform='scale(0.2)';

completed++;

setTimeout(()=>{

element.remove();

},500);

if(completed>=level.correct.length){

setTimeout(()=>{

nextLevel();

},900);

}

}else{

playWrong();

resetPosition(element);

}

}else{

resetPosition(element);

}

}

/* RESET */

function resetPosition(element){

element.style.transition='all 0.4s';

element.style.left=
element.dataset.startX+'vw';

element.style.top=
element.dataset.startY+'vh';

}

/* NEXT */

function nextLevel(){

currentLevel++;

if(currentLevel>=levels.length){

endGame();

}else{

loadLevel();

}

}

/* END */

function endGame(){

document.getElementById('gameScreen')
.classList.remove('active');

document.getElementById('finalScreen')
.classList.add('active');

createConfetti();

}

/* CONFETTI */

function createConfetti(){

let area=
document.getElementById('confettiArea');

area.innerHTML='';

let colors=[
'#ff4081',
'#2196f3',
'#4caf50',
'#ffeb3b',
'#ff9800',
'#9c27b0'
];

for(let i=0;i<140;i++){

let paper=
document.createElement('div');

paper.className='confetti';

paper.style.left=
Math.random()*100+'vw';

paper.style.background=
colors[
Math.floor(
Math.random()*colors.length
)
];

paper.style.animationDuration=
(2+Math.random()*3)+'s';

paper.style.width=
(4+Math.random()*6)+'px';

paper.style.height=
(4+Math.random()*6)+'px';

area.appendChild(paper);

}

}

/* RESTART */

function restartGame(){

document.getElementById('finalScreen')
.classList.remove('active');

document.getElementById('gameScreen')
.classList.add('active');

currentLevel=0;

loadLevel();

}

</script>

</body>
</html>
