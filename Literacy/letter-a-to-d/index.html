<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Feed The Letter Monster</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
font-family:'Arial Rounded MT Bold',sans-serif;
touch-action:none;

/* NEW PRESCHOOL BACKGROUND */

background:
linear-gradient(
to bottom,
#6ed6ff 0%,
#b5f1ff 35%,
#ffeaa7 35%,
#ffeaa7 45%,
#7ed957 45%,
#59c93d 100%
);

}

/* RAINBOW */

.rainbow{
position:absolute;
top:-120px;
left:-120px;
width:420px;
height:420px;
border-radius:50%;
border:28px solid #ff4d6d;
border-bottom-color:transparent;
border-left-color:transparent;
transform:rotate(45deg);
opacity:0.45;
}

.rainbow::before{
content:'';
position:absolute;
top:-55px;
left:-55px;
width:360px;
height:360px;
border-radius:50%;
border:24px solid #ffbe0b;
border-bottom-color:transparent;
border-left-color:transparent;
}

.rainbow::after{
content:'';
position:absolute;
top:-105px;
left:-105px;
width:470px;
height:470px;
border-radius:50%;
border:22px solid #8338ec;
border-bottom-color:transparent;
border-left-color:transparent;
}

/* CLOUDS */

.cloud{
position:absolute;
background:white;
border-radius:50%;
opacity:0.95;
box-shadow:0 0 25px rgba(255,255,255,0.9);
}

.cloud1{
width:170px;
height:80px;
top:25px;
left:25px;
}

.cloud2{
width:190px;
height:90px;
top:40px;
right:25px;
}

.cloud::before{
content:'';
position:absolute;
background:white;
border-radius:50%;
}

.cloud1::before{
width:90px;
height:90px;
top:-20px;
left:25px;
}

.cloud2::before{
width:100px;
height:100px;
top:-25px;
left:45px;
}

/* FLOWERS */

.flower{
position:absolute;
bottom:20px;
font-size:40px;
animation:bounce 2s infinite;
}

.fl1{left:5%;}
.fl2{left:20%;}
.fl3{right:25%;}
.fl4{right:8%;}

@keyframes bounce{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-8px);
}
}

/* GAME */

#game{
width:100vw;
height:100vh;
position:relative;
overflow:hidden;
}

/* LOGO */

#logoScreen{
position:absolute;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

#logoScreen img{
width:min(70vw,280px);
}

/* SCREENS */

.screen{
position:absolute;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
padding:10px;
}

.active{
display:flex;
}

/* TITLE */

.title{
font-size:min(12vw,78px);
font-weight:bold;
color:#ff4fa0;

text-shadow:
0 0 10px white,
0 5px 0 #d63384;

text-align:center;

margin-bottom:20px;
}

/* BUTTON */

.play-btn{
padding:16px 34px;

font-size:min(7vw,34px);

border:none;
border-radius:24px;

font-weight:bold;
color:white;

background:
linear-gradient(to bottom,
#ffcf33,
#ff8c00);

cursor:pointer;

box-shadow:
0 5px 0 #d67d00,
0 10px 15px rgba(0,0,0,0.2);
}

/* INSTRUCTION */

.instruction{
background:white;

padding:12px 20px;

border-radius:22px;

font-size:min(5vw,28px);

font-weight:bold;

text-align:center;

margin-bottom:12px;

box-shadow:
0 5px 12px rgba(0,0,0,0.18);

max-width:92%;
}

/* MONSTER */

#monsterArea{
position:relative;
width:100%;
height:38vh;

display:flex;
justify-content:center;
align-items:center;
}

#monsterContainer{
position:relative;
}

#monster{
width:min(60vw,310px);
}

/* LETTER SHIFTED DOWN */

#monsterLetter{
position:absolute;

left:50%;
top:64%;

transform:translate(-50%,-50%);

font-size:min(15vw,88px);

font-weight:bold;

/* DIFFERENT DARK COLOURS */

color:#111;

text-shadow:
0 0 8px white,
0 0 12px white;
}

/* MOUTH */

#mouthZone{
position:absolute;

left:50%;
top:78%;

transform:translateX(-50%);

width:35%;
height:12%;

border-radius:40px;
}

/* PICTURE AREA */

#pictureArea{
position:relative;
width:100%;
height:55vh;
}

/* PICTURES */

.picture{
position:absolute;

width:min(18vw,95px);

touch-action:none;

user-select:none;

cursor:grab;

transition:transform 0.2s;
}

.picture:active{
transform:scale(1.08);
}

/* FINAL */

#finalScreen{
background:
linear-gradient(to bottom,
#002d62,
#00152d);
}

/* CONFETTI */

.confetti{
position:absolute;
width:8px;
height:8px;
animation:fall linear infinite;
}

@keyframes fall{
from{
transform:translateY(-100px) rotate(0deg);
}
to{
transform:translateY(110vh) rotate(360deg);
}
}

</style>
</head>

<body>

<!-- BACKGROUND -->

<div class="rainbow"></div>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<div class="flower fl1">🌸</div>
<div class="flower fl2">🌼</div>
<div class="flower fl3">🌻</div>
<div class="flower fl4">🌺</div>

<!-- LOGO -->

<div id="logoScreen">

<img src="assets/innovine-logo.png">

</div>

<!-- AUDIO -->

<audio id="correctSound"
src="assets/freesound_community-claps-44774.mp3"></audio>

<audio id="wrongSound"
src="assets/wrong.mp3"></audio>

<!-- GAME -->

<div id="game">

<!-- START -->

<div class="screen active"
id="startScreen">

<div class="title">
Feed The Letter Monster
</div>

<button class="play-btn"
onclick="startGame()">
Play
</button>

</div>

<!-- GAME SCREEN -->

<div class="screen"
id="gameScreen">

<div class="instruction"
id="instruction">
Feed pictures that start with A
</div>

<!-- MONSTER -->

<div id="monsterArea">

<div id="monsterContainer">

<img src="assets/monster.png"
id="monster">

<div id="monsterLetter">
A
</div>

<div id="mouthZone"></div>

</div>

</div>

<!-- PICTURES -->

<div id="pictureArea"></div>

</div>

<!-- FINAL -->

<div class="screen"
id="finalScreen">

<div id="confettiArea"></div>

<div class="title">
Great Job!
</div>

<div class="instruction">
You fed all the letters
</div>

<button class="play-btn"
onclick="restartGame()">
Play again
</button>

</div>

</div>

<script>

/* LEVELS */

const levels=[

{
letter:'A',
correct:[
'assets/apple.png',
'assets/ant.png',
'assets/alligator.png',
'assets/aeroplane.png',
'assets/axe.png'
],
wrong:[
'assets/ball.png',
'assets/car.png',
'assets/dog.png'
]
},

{
letter:'B',
correct:[
'assets/bag.png',
'assets/ball.png',
'assets/balloon.png',
'assets/bat.png',
'assets/bear.png'
],
wrong:[
'assets/apple.png',
'assets/car.png',
'assets/dog.png'
]
},

{
letter:'C',
correct:[
'assets/cake.png',
'assets/cap.png',
'assets/car.png',
'assets/carrot.png',
'assets/cat.png'
],
wrong:[
'assets/apple.png',
'assets/doll.png',
'assets/dog.png'
]
},

{
letter:'D',
correct:[
'assets/dog.png',
'assets/doll.png',
'assets/door.png',
'assets/duckling.png',
'assets/dum.png'
],
wrong:[
'assets/apple.png',
'assets/car.png',
'assets/bag.png'
]
}

];

let currentLevel=0;
let completed=0;

/* LOGO */

window.onload=()=>{

setTimeout(()=>{

document.getElementById('logoScreen')
.style.display='none';

},5000);

}

/* CORRECT SOUND */

function playCorrect(){

let s=
document.getElementById('correctSound');

s.currentTime=0;

s.play();

/* REDUCED TIME BUT COMPLETE SOUND */

setTimeout(()=>{

s.pause();
s.currentTime=0;

},1200);

}

/* WRONG SOUND */

function playWrong(){

let s=
document.getElementById('wrongSound');

s.currentTime=0;

s.play();

}

/* START */

function startGame(){

document.getElementById('startScreen')
.classList.remove('active');

document.getElementById('gameScreen')
.classList.add('active');

currentLevel=0;

loadLevel();

}

/* LOAD LEVEL */

function loadLevel(){

completed=0;

let level=levels[currentLevel];

document.getElementById('monsterLetter')
.innerHTML=level.letter;

document.getElementById('instruction')
.innerHTML=
'Feed pictures that start with '+level.letter;

let area=
document.getElementById('pictureArea');

area.innerHTML='';

let images=[
...level.correct,
...level.wrong
];

images.sort(()=>Math.random()-0.5);

images.forEach((img,index)=>{

let pic=
document.createElement('img');

pic.src=img;

pic.className='picture';

pic.draggable=false;

pic.dataset.startX=
(5+(index%4)*22);

pic.dataset.startY=
(5+Math.floor(index/4)*22);

pic.style.left=
pic.dataset.startX+'vw';

pic.style.top=
pic.dataset.startY+'vh';

area.appendChild(pic);

makeDraggable(pic,img);

});

}

/* DRAG */

function makeDraggable(element,img){

let offsetX=0;
let offsetY=0;

function startDrag(e){

e.preventDefault();

let touch=
e.touches ? e.touches[0] : e;

offsetX=
touch.clientX-
element.offsetLeft;

offsetY=
touch.clientY-
element.offsetTop;

document.addEventListener(
'mousemove',
drag
);

document.addEventListener(
'touchmove',
drag,
{passive:false}
);

document.addEventListener(
'mouseup',
endDrag
);

document.addEventListener(
'touchend',
endDrag
);

}

function drag(e){

e.preventDefault();

let touch=
e.touches ? e.touches[0] : e;

element.style.left=
(touch.clientX-offsetX)+'px';

element.style.top=
(touch.clientY-offsetY)+'px';

}

function endDrag(){

document.removeEventListener(
'mousemove',
drag
);

document.removeEventListener(
'touchmove',
drag
);

checkDrop(element,img);

}

element.addEventListener(
'mousedown',
startDrag
);

element.addEventListener(
'touchstart',
startDrag,
{passive:false}
);

}

/* CHECK */

function checkDrop(element,img){

let mouth=
document.getElementById('mouthZone');

let mouthRect=
mouth.getBoundingClientRect();

let imgRect=
element.getBoundingClientRect();

let level=
levels[currentLevel];

let hit=
!(

imgRect.right < mouthRect.left ||

imgRect.left > mouthRect.right ||

imgRect.bottom < mouthRect.top ||

imgRect.top > mouthRect.bottom

);

if(hit){

if(level.correct.includes(img)){

playCorrect();

element.style.transition='all 0.5s';

element.style.opacity='0';

element.style.transform='scale(0.2)';

completed++;

setTimeout(()=>{

element.remove();

},500);

if(completed>=level.correct.length){

setTimeout(()=>{

nextLevel();

},900);

}

}else{

playWrong();

resetPosition(element);

}

}else{

resetPosition(element);

}

}

/* RESET */

function resetPosition(element){

element.style.transition='all 0.4s';

element.style.left=
element.dataset.startX+'vw';

element.style.top=
element.dataset.startY+'vh';

}

/* NEXT */

function nextLevel(){

currentLevel++;

if(currentLevel>=levels.length){

endGame();

}else{

loadLevel();

}

}

/* END */

function endGame(){

document.getElementById('gameScreen')
.classList.remove('active');

document.getElementById('finalScreen')
.classList.add('active');

createConfetti();

}

/* CONFETTI */

function createConfetti(){

let area=
document.getElementById('confettiArea');

area.innerHTML='';

let colors=[
'#ff4081',
'#2196f3',
'#4caf50',
'#ffeb3b',
'#ff9800',
'#9c27b0'
];

for(let i=0;i<140;i++){

let paper=
document.createElement('div');

paper.className='confetti';

paper.style.left=
Math.random()*100+'vw';

paper.style.background=
colors[
Math.floor(
Math.random()*colors.length
)
];

paper.style.animationDuration=
(2+Math.random()*3)+'s';

paper.style.width=
(4+Math.random()*6)+'px';

paper.style.height=
(4+Math.random()*6)+'px';

area.appendChild(paper);

}

}

/* RESTART */

function restartGame(){

document.getElementById('finalScreen')
.classList.remove('active');

document.getElementById('gameScreen')
.classList.add('active');

currentLevel=0;

loadLevel();

}

</script>

</body>
</html>
